# ===============================
# Spring Boot Application Config
# ===============================

# Server Configuration
server.port=9090

# H2 Database (In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# LinkedIn OAuth2 Configuration
# ===============================

# LinkedIn App Credentials
linkedin.client.id=${CLIENT_ID}
linkedin.client.secret=${CLIENT_SECRET}

# LinkedIn OAuth Redirect URI (must match LinkedIn Developer App exactly)
linkedin.redirect.uri=http://localhost:9090/auth/linkedin/callback

# OAuth 2.0 Scopes
linkedin.scope=r_organization_social,w_organization_social,r_liteprofile

# LinkedIn URLs
linkedin.auth.url=https://www.linkedin.com/oauth/v2/authorization
linkedin.token.url=https://www.linkedin.com/oauth/v2/accessToken
linkedin.profile.url=https://api.linkedin.com/v2/me
linkedin.email.url=https://api.linkedin.com/v2/emailAddress?q=members&projection=(elements*(handle~))

# ===============================
# JWT Configuration (if needed)
# ===============================
jwt.secret=my-super-secret-key
jwt.expiration-ms=3600000

# Optional Frontend Redirection
app.frontend.success-uri=http://localhost:3000/login/success
app.frontend.failure-uri=http://localhost:3000/login/failure
